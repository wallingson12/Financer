# docker compose up
# docker compose up -d -> reinicia e atualiza o container
# docker compose down -> derruba o container

services:

  api:
    build: .
    container_name: financer_api
    ports:
      - "5000:5000"

    environment:
      FINANCER_SECRET_KEY: dev-financer-secret
      FINANCER_JWT_KEY: dev-jwt-secret
      DB_HOST: mysql
      DB_USER: financer
      DB_PASSWORD: PwdBlog
      DB_NAME: financer

    depends_on:
      - mysql

    volumes:
      - .:/app

    restart: unless-stopped


  mysql:
    image: mysql:8.3
    container_name: financer_mysql

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: financer
      MYSQL_USER: financer
      MYSQL_PASSWORD: PwdBlog

    ports:
      - "3306:3306"

    volumes:
      - db_financer:/var/lib/mysql

    restart: unless-stopped


volumes:
  db_financer: